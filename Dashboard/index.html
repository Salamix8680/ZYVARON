<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZYVARON — Security Operations Center</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#020408;--bg2:#050d14;--bg3:#0a1520;--bg4:#0f1e2e;
  --cyan:#00f5ff;--cyan2:#00a8b5;--cg:rgba(0,245,255,0.15);
  --red:#ff2d55;--rg:rgba(255,45,85,0.15);
  --orange:#ff6b00;--og:rgba(255,107,0,0.15);
  --green:#00ff88;--gg:rgba(0,255,136,0.15);
  --yellow:#ffd700;--purple:#a855f7;
  --t1:#e0f0ff;--t2:#4a7a9b;--t3:#2a4a6b;
  --b:rgba(0,245,255,0.12);--bb:rgba(0,245,255,0.35);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);font-family:'Rajdhani',sans-serif;font-size:14px;overflow-x:hidden;cursor:crosshair}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,245,255,0.03) 2px,rgba(0,245,255,0.03) 4px);pointer-events:none;z-index:1000}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.hdr{position:fixed;top:0;left:0;right:0;height:60px;background:rgba(2,4,8,0.96);border-bottom:1px solid var(--bb);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100;backdrop-filter:blur(20px)}
.hdr::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);animation:scanH 4s linear infinite}
@keyframes scanH{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.logo{display:flex;align-items:center;gap:12px}
.logo-hex{width:50px;height:40px;background:var(--cg);border:2px solid var(--cyan);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:var(--cyan);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 10px var(--cyan)}50%{box-shadow:0 0 30px var(--cyan),0 0 60px var(--cg)}}
.logo-name{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:var(--cyan);letter-spacing:4px;text-shadow:0 0 20px var(--cyan)}
.logo-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--t2);letter-spacing:3px}
.hdr-stats{display:flex;align-items:center;gap:28px}
.hdr-stat{text-align:center}
.hdr-val{font-family:'Share Tech Mono',monospace;font-size:16px}
.hdr-lbl{font-size:9px;color:var(--t2);letter-spacing:2px;text-transform:uppercase}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.app{display:flex;min-height:100vh;padding-top:60px;position:relative;z-index:1}
.sidebar{width:220px;min-height:calc(100vh - 60px);background:rgba(5,13,20,0.9);border-right:1px solid var(--b);padding:24px 0;position:fixed;top:60px;left:0;bottom:0;overflow-y:auto}
.nav-sec{margin-bottom:28px}
.nav-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--t3);letter-spacing:3px;padding:0 20px;margin-bottom:8px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:pointer;transition:all 0.2s;border-left:2px solid transparent;font-size:12px;font-weight:600;letter-spacing:1px;color:var(--t2);text-transform:uppercase}
.nav-item:hover,.nav-item.active{background:var(--cg);color:var(--cyan);border-left-color:var(--cyan)}
.main{flex:1;margin-left:220px;padding:24px;min-height:calc(100vh - 60px)}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.pt{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;letter-spacing:3px;text-transform:uppercase}
.pt span{color:var(--cyan)}
.rbtn{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--cyan);background:var(--cg);border:1px solid var(--bb);padding:8px 16px;cursor:pointer;letter-spacing:2px;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:all 0.2s}
.rbtn:hover{background:rgba(0,245,255,0.25);box-shadow:0 0 20px var(--cg)}
.panel{background:var(--bg3);border:1px solid var(--b);overflow:hidden;margin-bottom:16px}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--b);background:rgba(0,245,255,0.02)}
.panel-title{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:var(--cyan);letter-spacing:3px}
.badge{font-family:'Share Tech Mono',monospace;font-size:9px;padding:3px 10px;border:1px solid;letter-spacing:1px}
.b-red{color:var(--red);border-color:var(--red);background:var(--rg)}
.b-green{color:var(--green);border-color:var(--green);background:var(--gg)}
.b-cyan{color:var(--cyan);border-color:var(--cyan);background:var(--cg)}
.b-orange{color:var(--orange);border-color:var(--orange);background:var(--og)}
.b-purple{color:var(--purple);border-color:var(--purple);background:rgba(168,85,247,0.15)}
.pb{padding:16px 20px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.sc{background:var(--bg3);border:1px solid var(--b);padding:20px;position:relative;overflow:hidden;transition:all 0.3s;clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,16px 100%,0 calc(100% - 16px))}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac,var(--cyan));box-shadow:0 0 10px var(--ac,var(--cyan))}
.sc:hover{background:var(--bg4);transform:translateY(-2px)}
.sc.red{--ac:var(--red)}.sc.orange{--ac:var(--orange)}.sc.green{--ac:var(--green)}.sc.cyan{--ac:var(--cyan)}.sc.purple{--ac:var(--purple)}
.sc-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--t2);letter-spacing:3px;margin-bottom:10px}
.sc-val{font-family:'Orbitron',monospace;font-size:36px;font-weight:900;color:var(--ac,var(--cyan));text-shadow:0 0 20px var(--ac,var(--cyan));line-height:1;margin-bottom:6px}
.sc-sub{font-size:11px;color:var(--t2);letter-spacing:1px}
.sc-icon{position:absolute;top:14px;right:14px;font-size:28px;opacity:0.12}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g31{display:grid;grid-template-columns:2fr 1fr;gap:16px}
.secure-banner{background:linear-gradient(135deg,rgba(0,255,136,0.06),rgba(0,255,136,0.02));border:1px solid rgba(0,255,136,0.35);padding:28px 32px;display:flex;align-items:center;gap:28px;margin-bottom:20px;position:relative;overflow:hidden;animation:sglow 3s ease-in-out infinite}
@keyframes sglow{0%,100%{box-shadow:0 0 20px rgba(0,255,136,0.1)}50%{box-shadow:0 0 50px rgba(0,255,136,0.2),inset 0 0 40px rgba(0,255,136,0.04)}}
.secure-banner::before{content:'';position:absolute;top:0;left:-100%;bottom:0;width:60%;background:linear-gradient(90deg,transparent,rgba(0,255,136,0.06),transparent);animation:shimmer 3s linear infinite}
@keyframes shimmer{0%{left:-100%}100%{left:100%}}
.s-icon{font-size:60px;filter:drop-shadow(0 0 20px var(--green));flex-shrink:0;animation:spulse 2s ease-in-out infinite}
@keyframes spulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.s-title{font-family:'Orbitron',monospace;font-size:26px;font-weight:900;color:var(--green);letter-spacing:4px;text-shadow:0 0 30px var(--green);margin-bottom:6px}
.s-sub{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--t2);letter-spacing:2px;margin-bottom:16px}
.s-stats{display:flex;gap:28px}
.s-stat-val{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;color:var(--green);text-shadow:0 0 10px var(--green)}
.s-stat-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--t2);letter-spacing:2px;margin-top:3px}
.rem-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--b)}
.rem-item:last-child{border-bottom:none}
.rem-dot{width:32px;height:32px;border-radius:50%;background:var(--gg);border:1px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;box-shadow:0 0 10px var(--gg)}
.al-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--b)}
.al-item:last-child{border-bottom:none}
.sev{font-family:'Share Tech Mono',monospace;font-size:9px;padding:4px 8px;border:1px solid;letter-spacing:1px;white-space:nowrap;min-width:70px;text-align:center}
.sev-CRITICAL{color:var(--red);border-color:var(--red);background:var(--rg);animation:flash 1s ease-in-out infinite}
.sev-HIGH{color:var(--orange);border-color:var(--orange);background:var(--og)}
.sev-MEDIUM{color:var(--yellow);border-color:var(--yellow)}
.sev-LOW{color:var(--green);border-color:var(--green)}
@keyframes flash{0%,100%{opacity:1}50%{opacity:0.5}}
.gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 16px}
.gauge{width:120px;height:120px;border-radius:50%;border:3px solid var(--b);display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:12px}
.gauge::before{content:'';position:absolute;inset:-3px;border-radius:50%;border:3px solid transparent;border-top-color:var(--gc,var(--green));border-right-color:var(--gc,var(--green));animation:spin 3s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.gauge-val{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:var(--gc,var(--green));text-shadow:0 0 20px var(--gc,var(--green))}
.gauge-lbl{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--t2);letter-spacing:2px}
/* MODE SWITCHER */
.mode-switcher{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.mode-btn{padding:10px 6px;text-align:center;cursor:pointer;border:1px solid var(--b);background:var(--bg2);transition:all 0.2s;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--t2)}
.mode-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.mode-btn.active-smart{border-color:var(--cyan);background:var(--cg);color:var(--cyan);box-shadow:0 0 12px var(--cg)}
.mode-btn.active-auto{border-color:var(--green);background:var(--gg);color:var(--green);box-shadow:0 0 12px var(--gg)}
.mode-btn.active-manual{border-color:var(--orange);background:var(--og);color:var(--orange);box-shadow:0 0 12px var(--og)}
.metric{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.m-lbl{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--t2);letter-spacing:1px;width:55px}
.m-bar{flex:1;height:4px;background:rgba(255,255,255,0.05);border:1px solid var(--b)}
.m-fill{height:100%;transition:width 1s ease}
.m-cpu{background:linear-gradient(90deg,var(--cyan2),var(--cyan));box-shadow:0 0 8px var(--cyan)}
.m-ram{background:linear-gradient(90deg,#7b2fff,#a855f7);box-shadow:0 0 8px #a855f7}
.m-disk{background:linear-gradient(90deg,var(--orange),#ffaa00);box-shadow:0 0 8px var(--orange)}
.m-val{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;width:42px;text-align:right}
.port-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--b);font-family:'Share Tech Mono',monospace;font-size:12px}
.port-row:last-child{border-bottom:none}
.dev-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1px solid var(--b);margin-bottom:8px;background:var(--bg2);position:relative;overflow:hidden;cursor:pointer;transition:all 0.2s}
.dev-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green);box-shadow:0 0 8px var(--green)}
.dev-row:hover{background:var(--bg4);border-color:var(--cyan2)}
.risk{font-family:'Orbitron',monospace;font-size:20px;font-weight:700}
.risk.low{color:var(--green)}.risk.medium{color:var(--yellow)}.risk.high{color:var(--orange)}.risk.critical{color:var(--red);text-shadow:0 0 10px var(--red)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--t3)}
.spinner{width:36px;height:36px;border:2px solid var(--b);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:8px}
.fade-in{animation:fadeUp 0.4s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--cyan2)}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">
    <div class="logo-hex">Z</div>
    <div>
      <div class="logo-name">Z</div>
      <div class="logo-sub">SECURITY OPERATIONS CENTER</div>
    </div>
  </div>
  <div class="hdr-stats">
    <div class="hdr-stat"><div class="hdr-val" id="h-devices">—</div><div class="hdr-lbl">Devices Online</div></div>
    <div class="hdr-stat"><div class="hdr-val" id="h-alerts" style="color:var(--red)">—</div><div class="hdr-lbl">Active Alerts</div></div>
    <div class="hdr-stat"><div class="hdr-val" id="h-resolved" style="color:var(--green)">—</div><div class="hdr-lbl">Threats Resolved</div></div>
    <div class="hdr-stat"><div class="hdr-val" id="h-files" style="color:var(--cyan)">—</div><div class="hdr-lbl">Files Protected</div></div>
    <div class="hdr-stat"><div class="hdr-val" id="clock">00:00:00</div><div class="hdr-lbl">Local Time</div></div>
    <div class="dot"></div>
  </div>
</header>

<div class="app">
  <nav class="sidebar">
    <div class="nav-sec">
      <div class="nav-lbl">Monitor</div>
      <div class="nav-item active" onclick="go('overview',this)">⬡ &nbsp;Overview</div>
      <div class="nav-item" onclick="go('devices',this)">◈ &nbsp;Devices</div>
      <div class="nav-item" onclick="go('alerts',this)">⚠ &nbsp;Alerts</div>
      <div class="nav-item" onclick="go('remediation',this)">⚙ &nbsp;Remediation</div>
    </div>
    <div class="nav-sec">
      <div class="nav-lbl">Protect</div>
      <div class="nav-item" onclick="go('files',this)">◉ &nbsp;File Vault</div>
      <div class="nav-item" onclick="go('ports',this)">◈ &nbsp;Port Scanner</div>
      <div class="nav-item" onclick="go('cve',this)">⬡ &nbsp;CVE Scanner</div>
    </div>
    <div class="nav-sec">
      <div class="nav-lbl">System</div>
      <div class="nav-item" onclick="go('system',this)">▣ &nbsp;System Health</div>
    </div>
  </nav>
  <main class="main" id="main"></main>
</div>

<script>
const API = 'http://localhost:8000';
let S = {
  devices:[], alerts:[], resolved:[], counts:{}, summary:{},
  fileStats:{}, deletedFiles:[], page:'overview',
  remMode:'smart', cveSummary:{}, cveEntries:[],
  totalFiles: 0
};

setInterval(()=>{ document.getElementById('clock').textContent = new Date().toTimeString().slice(0,8); }, 1000);

function timeAgo(iso){
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if(s < 60) return s + 's ago';
  if(s < 3600) return Math.floor(s/60) + 'm ago';
  if(s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}
function riskClass(n){ return n>=20?'critical':n>=10?'high':n>=5?'medium':'low'; }
function sevColor(s){ return {CRITICAL:'var(--red)',HIGH:'var(--orange)',MEDIUM:'var(--yellow)',LOW:'var(--green)'}[s]||'var(--cyan)'; }
function modeColor(m){ return {smart:'var(--cyan)',auto:'var(--green)',manual:'var(--orange)'}[m]||'var(--cyan)'; }
function modeClass(m){ return {smart:'active-smart',auto:'active-auto',manual:'active-manual'}[m]||'active-smart'; }

async function fetchAll(){
  try{
    const [dr, ar, allr, fsr, dfr, moder] = await Promise.all([
      fetch(`${API}/api/devices/`).then(r=>r.json()).catch(()=>({devices:[]})),
      fetch(`${API}/api/alerts/`).then(r=>r.json()).catch(()=>({alerts:[],severity_counts:{}})),
      fetch(`${API}/api/alerts/all`).then(r=>r.json()).catch(()=>({resolved_alerts:[],active_alerts:[]})),
      fetch(`${API}/api/files/stats`).then(r=>r.json()).catch(()=>({})),
      fetch(`${API}/api/files/deleted`).then(r=>r.json()).catch(()=>({deleted_files:[]})),
      fetch(`${API}/api/alerts/remediation-mode`).then(r=>r.json()).catch(()=>({mode:'smart'})),
    ]);

    S.devices      = dr.devices || [];
    S.alerts       = ar.alerts || [];
    S.counts       = ar.severity_counts || {};
    S.resolved     = allr.resolved_alerts || [];
    S.fileStats    = fsr || {};
    S.deletedFiles = dfr.deleted_files || [];
    S.remMode      = (moder.mode || 'smart').toLowerCase();

    // Real file count from server (not hardcoded)
    S.totalFiles   = S.devices.reduce((a,d) => a + (d.indexed_files||0), 0) || (fsr.total_files||0);

    const online = S.devices.filter(d=>d.online).length;
    document.getElementById('h-devices').textContent  = online;
    document.getElementById('h-alerts').textContent   = S.alerts.length;
    document.getElementById('h-resolved').textContent = S.resolved.length;
    document.getElementById('h-files').textContent    = S.totalFiles.toLocaleString();

    if(S.devices[0]){
      try{
        const sr = await fetch(`${API}/api/devices/${S.devices[0].id}/summary`).then(r=>r.json());
        S.summary = sr;
        // Update file count from summary if better
        if(sr.files && sr.files.total_indexed) S.totalFiles = sr.files.total_indexed;
      }catch(e){}
      try{
        const devId = S.devices[0].id;
        const [cveSum, cveEnt] = await Promise.all([
          fetch(`${API}/api/cve/summary?device_id=${devId}`).then(r=>r.json()).catch(()=>({})),
          fetch(`${API}/api/cve/entries?device_id=${devId}&limit=100`).then(r=>r.json()).catch(()=>({entries:[]})),
        ]);
        S.cveSummary = cveSum || {};
        S.cveEntries = cveEnt.entries || [];
      }catch(e){}
    }
    renderPage(S.page);
  }catch(e){ renderPage(S.page); }
}

async function setMode(mode){
  try{
    await fetch(`${API}/api/alerts/remediation-mode`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({mode})
    });
    S.remMode = mode;
    renderPage(S.page);
  }catch(e){ console.error('Mode set failed:', e); }
}

async function requestRecovery(filePath, deviceId){
  const btnId = 'rbtn-' + btoa(filePath).slice(0,8);
  const btn = document.getElementById(btnId);
  if(btn){ btn.textContent='QUEUING...'; btn.disabled=true; btn.style.opacity='0.5'; }
  try{
    const r = await fetch(`${API}/api/files/recover`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({file_path: filePath, device_id: deviceId})
    });
    const d = await r.json();
    if(d.success){
      if(btn){ btn.textContent='✓ QUEUED'; btn.style.color='var(--green)'; btn.style.borderColor='var(--green)'; }
      setTimeout(fetchAll, 35000);
    } else {
      if(btn){ btn.textContent='FAILED'; btn.style.color='var(--red)'; }
    }
  }catch(e){ if(btn){ btn.textContent='ERROR'; btn.style.color='var(--red)'; } }
}

async function markCVEPatched(cveId, deviceId){
  try{
    await fetch(`${API}/api/cve/resolve/${cveId}?device_id=${deviceId}`, {method:'POST'});
    await fetchAll();
  }catch(e){}
}

function go(page, el){
  S.page = page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el) el.classList.add('active');
  renderPage(page);
}

function renderPage(p){
  const m = document.getElementById('main');
  const pages = {
    overview: renderOverview, devices: renderDevices, alerts: renderAlerts,
    remediation: renderRemediation, files: renderFiles, ports: renderPorts,
    cve: renderCVE, system: renderSystem
  };
  if(pages[p]) pages[p](m);
}

// ── MODE SWITCHER WIDGET ─────────────────────────────────────
function modeSwitcherHTML(){
  const m = S.remMode;
  return `
  <div class="panel">
    <div class="panel-hdr">
      <div class="panel-title">Remediation Mode</div>
      <span class="badge" style="color:${modeColor(m)};border-color:${modeColor(m)}">${m.toUpperCase()}</span>
    </div>
    <div class="pb">
      <div class="mode-switcher">
        <div class="mode-btn ${m==='smart'?'active-smart':''}" onclick="setMode('smart')">
          <div style="font-size:18px;margin-bottom:4px">⚡</div>
          <div style="font-size:10px;font-weight:700;letter-spacing:1px">SMART</div>
          <div style="font-size:9px;color:var(--t3);margin-top:3px">Auto-blocks threats</div>
        </div>
        <div class="mode-btn ${m==='auto'?'active-auto':''}" onclick="setMode('auto')">
          <div style="font-size:18px;margin-bottom:4px">🤖</div>

                <div style="font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--red);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${fileName}</div>
                <div style="font-size:10px;color:var(--t3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${dir}</div>
                <div style="font-size:9px;color:var(--t2);margin-top:3px;font-family:'Share Tech Mono',monospace">${timeAgo(f.detected_at)} · ${f.device_id}</div>
              </div>
              <button id="${btnId}"
                onclick="requestRecovery('${(f.file_path||'').replace(/'/g,"\\'")}','${f.device_id}')"
                style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--cyan);background:var(--cg);border:1px solid var(--cyan);padding:8px 14px;cursor:pointer;letter-spacing:1px;white-space:nowrap;transition:all 0.2s;flex-shrink:0"
              >⟳ RECOVER</button>
            </div>`; }).join('')}
        </div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="panel">
        <div class="panel-hdr"><div class="panel-title">File Activity</div><span class="badge b-cyan">LIVE</span></div>
        <div class="pb">
          ${[
            ['Files Indexed', files>0?files.toLocaleString():'—', 'var(--cyan)'],
            ['Modified',      fs.modified||0,                     'var(--orange)'],
            ['Deleted',       fs.deleted_unrecovered||deleted.length, 'var(--red)'],
            ['Recovered',     fs.recovered||0,                    'var(--green)'],
            ['New Files',     fs.new_files||0,                    'var(--cyan)'],
          ].map(([l,v,c])=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--b)">
              <span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--t2);letter-spacing:1px">${l}</span>
              <span style="font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:${c}">${v}</span>
            </div>`).join('')}
        </div>
      </div>
      <div class="panel">
        <div class="panel-hdr"><div class="panel-title">Recovery Time</div></div>
        <div class="pb" style="text-align:center;padding:20px">
          <div style="font-family:'Orbitron',monospace;font-size:48px;font-weight:900;color:var(--green);text-shadow:0 0 30px var(--green)">~30s</div>
          <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--t2);letter-spacing:3px;margin-top:8px">FROM CLICK TO RESTORED</div>
          <div style="font-size:11px;color:var(--t3);margin-top:8px">Agent polls every 30 seconds<br>for recovery requests</div>
        </div>
      </div>
    </div>
  </div>`;
}

// ── PORTS PAGE ───────────────────────────────────────────────
function renderPorts(el){
  const portData = S.summary.ports || {open_ports:[],risk_score:0};
  const ports = portData.open_ports || [];
  const riskPorts = {445:'CRITICAL',3389:'HIGH',23:'CRITICAL',21:'HIGH',1433:'HIGH',3306:'HIGH',5900:'CRITICAL'};
  el.innerHTML = `
  <div class="ph fade-in"><div class="pt">PORT <span>SCANNER</span></div><button class="rbtn" onclick="fetchAll()">⟳ REFRESH</button></div>
  <div class="stats-grid fade-in">
    <div class="sc cyan"><div class="sc-lbl">Open Ports</div><div class="sc-val">${ports.length}</div></div>
    <div class="sc red"><div class="sc-lbl">Dangerous</div><div class="sc-val">${ports.filter(p=>riskPorts[p.port]).length}</div></div>
    <div class="sc green"><div class="sc-lbl">Blocked by ZYVARON</div>
      <div class="sc-val" style="color:var(--green)">${S.resolved.filter(a=>a.alert_type==='port_exposure'||a.alert_type==='critical_exposure').length}</div></div>
    <div class="sc cyan"><div class="sc-lbl">Risk Score</div><div class="sc-val">${portData.risk_score||0}</div></div>
  </div>
  <div class="panel fade-in">
    <div class="panel-hdr"><div class="panel-title">Open Ports</div><span class="badge b-cyan">${ports.length} FOUND</span></div>
    <div class="pb">
      ${ports.length===0 ? `<div class="empty"><div class="spinner"></div><div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--t2);letter-spacing:2px">LOADING PORT DATA...</div></div>` :
       ports.map(p=>{
        const risk = riskPorts[p.port] || 'LOW';
        return `<div class="port-row">
          <span style="color:var(--cyan);font-size:14px">${p.port}</span>
          <span style="color:var(--t1);flex:1;margin:0 12px">${p.service||'Unknown'}</span>
          <span class="sev sev-${risk}">${risk}</span>
        </div>`;}).join('')}
    </div>
  </div>`;
}

// ── SYSTEM PAGE ──────────────────────────────────────────────
function renderSystem(el){
  const sys  = S.summary.system || {};
  const cpu  = sys.cpu_percent || 0;
  const ram  = sys.ram_percent || 0;
  const disk = sys.disk_percent || 0;
  el.innerHTML = `
  <div class="ph fade-in"><div class="pt">SYSTEM <span>HEALTH</span></div><button class="rbtn" onclick="fetchAll()">⟳ REFRESH</button></div>
  <div class="g2 fade-in">
    <div class="panel">
      <div class="panel-hdr"><div class="panel-title">Resource Usage</div><span class="badge b-cyan">LIVE</span></div>
      <div class="pb" style="padding-top:20px">
        ${[['CPU',cpu,'m-cpu','var(--cyan)'],['RAM',ram,'m-ram','#a855f7'],['DISK',disk,'m-disk','var(--orange)']].map(([l,v,cls,c])=>`
          <div class="metric">
            <div class="m-lbl">${l}</div>
            <div class="m-bar"><div class="m-fill ${cls}" style="width:${v}%"></div></div>
            <div class="m-val" style="color:${c}">${v.toFixed(1)}%</div>
          </div>`).join('')}
        ${cpu>95?`<div style="padding:10px;background:var(--og);border:1px solid var(--orange);font-size:11px;color:var(--orange);margin-top:12px">⚠ Extremely high CPU — possible cryptominer</div>`:''}
        ${ram>95?`<div style="padding:10px;background:var(--rg);border:1px solid var(--red);font-size:11px;color:var(--red);margin-top:12px">⚠ Critical RAM usage</div>`:''}
      </div>
    </div>
    <div class="panel">
      <div class="panel-hdr"><div class="panel-title">System Info</div></div>
      <div class="pb">
        ${S.devices[0] ? [
          ['Hostname',     S.devices[0].hostname],
          ['Platform',     S.devices[0].platform],
          ['Architecture', S.devices[0].architecture],
          ['Agent ID',     S.devices[0].id],
          ['Files Indexed',(S.devices[0].indexed_files||0).toLocaleString()],
          ['Status',       S.devices[0].online?'ONLINE':'OFFLINE'],
        ].map(([k,v])=>`
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--b);font-size:12px">
            <span style="color:var(--t2);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px">${k}</span>
            <span style="color:var(--t1)">${v}</span>
          </div>`).join('') : `<div class="empty"><div class="spinner"></div></div>`}
      </div>
    </div>
  </div>`;
}

// ── CVE SCANNER PAGE ─────────────────────────────────────────
function renderCVE(el){
  const cves     = S.cveEntries || [];
  const critical = cves.filter(c=>c.severity==='CRITICAL');
  const high     = cves.filter(c=>c.severity==='HIGH');
  const medium   = cves.filter(c=>c.severity==='MEDIUM');

  function sevCol(s){ return {CRITICAL:'var(--red)',HIGH:'var(--orange)',MEDIUM:'var(--yellow)'}[s]||'var(--cyan)'; }
  function cveRow(c){ return `
    <div style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--b)">
      <div style="font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:${sevCol(c.severity)};min-width:44px;text-align:center;text-shadow:0 0 10px ${sevCol(c.severity)}">${c.score||'?'}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:${sevCol(c.severity)};letter-spacing:1px;margin-bottom:3px">${c.cve_id}</div>
        <div style="font-size:12px;font-weight:600;color:var(--t1);margin-bottom:3px">${c.software||''} ${c.version||''}</div>
        <div style="font-size:10px;color:var(--t2);line-height:1.5">${(c.description||'').slice(0,120)}${(c.description||'').length>120?'...':''}</div>
        ${c.url?`<div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--cyan);margin-top:5px">→ ${c.url}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
        <span class="sev sev-${c.severity}">${c.severity}</span>
        ${c.resolved ? `<span class="badge b-green">PATCHED</span>` :
          `<button onclick="markCVEPatched('${c.cve_id}','${c.device_id}')"
             style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--green);background:var(--gg);border:1px solid var(--green);padding:5px 10px;cursor:pointer;letter-spacing:1px;white-space:nowrap">
             ✓ MARK PATCHED</button>`}
      </div>
    </div>`; }

  el.innerHTML = `
  <div class="ph fade-in">
    <div class="pt">CVE <span>VULNERABILITY SCANNER</span></div>
    <button class="rbtn" onclick="fetchAll()">⟳ REFRESH</button>
  </div>
  <div class="stats-grid fade-in">
    <div class="sc red"><div class="sc-icon">⚠</div><div class="sc-lbl">Critical CVEs</div>
      <div class="sc-val">${critical.length}</div><div class="sc-sub">${critical.length===0?'✓ ALL CLEAR':'PATCH NOW'}</div></div>
    <div class="sc orange"><div class="sc-icon">◈</div><div class="sc-lbl">High CVEs</div>
      <div class="sc-val">${high.length}</div><div class="sc-sub">${high.length===0?'✓ CLEAR':'PATCH SOON'}</div></div>
    <div class="sc"><div class="sc-icon">▲</div><div class="sc-lbl">Medium CVEs</div>
      <div class="sc-val" style="font-size:28px">${medium.length}</div><div class="sc-sub">MONITOR</div></div>
    <div class="sc cyan"><div class="sc-icon">▣</div><div class="sc-lbl">Total Found</div>
      <div class="sc-val">${cves.length}</div><div class="sc-sub">ACROSS ALL SOFTWARE</div></div>
  </div>
  <div class="g2 fade-in">
    <div style="display:flex;flex-direction:column;gap:16px">
      ${critical.length>0?`<div class="panel"><div class="panel-hdr"><div class="panel-title">Critical Vulnerabilities</div><span class="badge b-red">${critical.length} CRITICAL</span></div><div class="pb" style="max-height:400px;overflow-y:auto">${critical.map(cveRow).join('')}</div></div>`:''}
      ${high.length>0?`<div class="panel"><div class="panel-hdr"><div class="panel-title">High Vulnerabilities</div><span class="badge b-orange">${high.length} HIGH</span></div><div class="pb" style="max-height:400px;overflow-y:auto">${high.map(cveRow).join('')}</div></div>`:''}
      ${medium.length>0?`<div class="panel"><div class="panel-hdr"><div class="panel-title">Medium Vulnerabilities</div><span class="badge b-cyan">${medium.length} MEDIUM</span></div><div class="pb" style="max-height:300px;overflow-y:auto">${medium.map(cveRow).join('')}</div></div>`:''}
      ${cves.length===0?`<div class="panel"><div class="panel-hdr"><div class="panel-title">CVE Scan Status</div><span class="badge b-cyan">INITIALIZING</span></div><div class="pb"><div class="empty" style="padding:40px"><div class="spinner"></div><div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--t2);letter-spacing:2px">AWAITING FIRST CVE SCAN</div><div style="font-size:11px;color:var(--t3);margin-top:8px;text-align:center">First scan runs 60s after agent starts<br>Rescans every 6 hours automatically</div></div></div></div>`:''}
    </div>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="panel">
        <div class="panel-hdr"><div class="panel-title">Scan Info</div><span class="badge b-cyan">NIST NVD</span></div>
        <div class="pb">
          ${[
            ['Database',      'NIST National Vulnerability Database','var(--cyan)'],
            ['Scan Interval', 'Every 6 hours',                       'var(--green)'],
            ['Min Score',     'CVSS ≥ 4.0 reported',                'var(--orange)'],
            ['Total Found',   cves.length+' CVEs',                  'var(--cyan)'],
            ['Patched',       cves.filter(c=>c.resolved).length+' resolved','var(--green)'],
            ['In Overview',   'NOT SHOWN — CVE section only',       'var(--t3)'],
          ].map(([l,v,c])=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--b)">
              <span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--t2);letter-spacing:1px">${l}</span>
              <span style="font-size:11px;font-weight:600;color:${c}">${v}</span>
            </div>`).join('')}
        </div>
      </div>
      <div class="panel">
        <div class="panel-hdr"><div class="panel-title">How to Patch</div></div>
        <div class="pb">
          ${[['1','Open PowerShell as Administrator','var(--cyan)'],
             ['2','Run: winget upgrade --id [package]','var(--cyan)'],
             ['3','Wait for update to complete','var(--green)'],
             ['4','Click MARK PATCHED on the CVE row','var(--green)'],
             ['5','ZYVARON removes it from the list','var(--green)']
          ].map(([n,d,c])=>`
            <div style="display:flex;align-items:flex-start;gap:12px;padding:9px 0;border-bottom:1px solid var(--b)">
              <div style="width:22px;height:22px;border-radius:50%;background:${c};display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:9px;font-weight:700;color:var(--bg);flex-shrink:0">${n}</div>
              <div style="font-size:11px;color:var(--t2);padding-top:3px">${d}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

// Start
fetchAll();
setInterval(fetchAll, 30000);
</script>
</body>
</html>
